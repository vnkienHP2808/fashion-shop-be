spring.application.name=fashionshop

spring.datasource.url=jdbc:mysql://localhost:3306/fashionshop?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
server.port=8080
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

image.upload-dir=D:/4.project/web_fashionshop_be/images/

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=fashionshop-secret-key-must-be-at-least-32-characters
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

spring.jpa.properties.hibernate.connection.charSet=UTF-8